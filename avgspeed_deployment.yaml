apiVersion: apps/v1
kind: Deployment
metadata:
  name: avgspeeddb-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: avgspeeddb-app
  template:
    metadata:
      labels:
        app: avgspeeddb-app
    spec:
      containers:
        - name: avgspeeddb-app
          image: avgspeeddb-app:latest
          imagePullPolicy: Never
          env:
            # X11 forwarding for GUI display
            - name: DISPLAY
              value: "host.minikube.internal:0"
            # Database connection
            - name: DB_HOST
              value: "host.minikube.internal"
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: "average_speed_db"
            - name: DB_USER
              value: "root"
            - name: DB_PASSWORD
              value: "Test12"
          volumeMounts:
            # For X11 socket (if needed)
            - name: x11-socket
              mountPath: /tmp/.X11-unix
      volumes:
        - name: x11-socket
          hostPath:
            path: /tmp/.X11-unix
            type: Directory